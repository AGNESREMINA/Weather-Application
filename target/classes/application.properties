# ==========================================
# Stratus Weather App - Configuration
# ==========================================

# Server
server.port=8080

# ── DATABASE ──────────────────────────────
# Change username/password to match your MySQL setup
spring.datasource.url=jdbc:mysql://localhost:3306/weather_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Agnesremina_3105
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / HIBERNATE ───────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── THYMELEAF ─────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ── OPENWEATHERMAP API ────────────────────
# Sign up free at: https://openweathermap.org/api
# Copy your API key and paste below (replace YOUR_API_KEY_HERE)
weather.api.key=a99ec97082d6d133349bf2b621b1d5b9
weather.api.base-url=https://api.openweathermap.org/data/2.5
weather.api.units=metric

# ── LOGGING ───────────────────────────────
logging.level.com.weather=INFO
logging.level.org.springframework.web=ERROR
